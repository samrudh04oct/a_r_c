<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARC Drive - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 2.5em;
        }
        p {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        button, a {
            padding: 16px 32px;
            border-radius: 10px;
            border: none;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: block;
        }
        .btn-dashboard {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-dashboard:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        .btn-website {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn-website:hover {
            background: #f8f9ff;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 ARC DRIVE</h1>
        <p>Frontend-Only CI/CD Pipeline & Website</p>
        
        <div class="buttons">
            <a href="/simple-dashboard.html" class="btn-dashboard">📊 CI/CD Pipeline Dashboard</a>
            <a href="/app.html" class="btn-website">🌐 ARC Drive Website</a>
        </div>
    </div>
</body>
</html>
