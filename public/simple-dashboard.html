<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC Drive - CI/CD Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d3d 100%);
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        h2 { color: #00d4ff; margin-top: 30px; margin-bottom: 20px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .stat {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .stat-value { font-size: 2em; color: #00d4ff; font-weight: bold; }
        .stat-label { color: #aaa; margin-top: 10px; }
        .stages {
            display: flex;
            justify-content: space-around;
            margin: 40px 0;
            flex-wrap: wrap;
            gap: 20px;
        }
        .stage-box {
            width: 110px;
            height: 110px;
            border: 2px solid #888;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
        }
        .stage-box.done {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }
        .logs {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            margin: 20px 0;
            line-height: 1.6;
            color: #22c55e;
        }
        .controls {
            text-align: center;
            margin-top: 30px;
        }
        .btn {
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px 5px;
            transition: all 0.3s ease;
            font-size: 1em;
        }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .back-link {
            margin-left: 20px;
            color: #00d4ff;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            padding: 12px 30px;
            border: 2px solid #00d4ff;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .back-link:hover { background: #00d4ff; color: #1e1e2e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 ARC DRIVE CI/CD PIPELINE</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="runs">0</div>
                <div class="stat-label">Total Runs</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="success">100%</div>
                <div class="stat-label">Success Rate</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="duration">0s</div>
                <div class="stat-label">Avg Duration</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="lastrun">--:--</div>
                <div class="stat-label">Last Run</div>
            </div>
        </div>

        <h2>📊 Pipeline Stages</h2>
        <div class="stages">
            <div class="stage-box" id="s0">📦<br>Source</div>
            <div class="stage-box" id="s1">🔨<br>Build</div>
            <div class="stage-box" id="s2">✅<br>Test</div>
            <div class="stage-box" id="s3">🔒<br>Security</div>
            <div class="stage-box" id="s4">🚀<br>Deploy</div>
        </div>

        <h2>📋 Execution Logs</h2>
        <div class="logs" id="logs">Ready to trigger pipeline...$</div>

        <div class="controls">
            <button class="btn" id="triggerBtn" onclick="triggerPipeline()">▶ TRIGGER PIPELINE</button>
            <button class="btn" onclick="clearLogs()">Clear Logs</button>
            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script>
        const stages = [
            { name: 'Source', duration: 1.2 },
            { name: 'Build', duration: 3.4 },
            { name: 'Test', duration: 2.1 },
            { name: 'Security', duration: 1.6 },
            { name: 'Deploy', duration: 2.1 }
        ];

        let stats = JSON.parse(localStorage.getItem('pipelineStats')) || {
            runs: 0,
            duration: 0,
            logs: []
        };

        function addLog(message) {
            const logsDiv = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            logsDiv.innerHTML += '\n[' + time + '] ' + message;
            logsDiv.scrollTop = logsDiv.scrollHeight;
            stats.logs.push('[' + time + '] ' + message);
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = 'Ready to trigger pipeline...$';
            stats.logs = [];
        }

        function updateStats() {
            document.getElementById('runs').textContent = stats.runs;
            document.getElementById('success').textContent = stats.runs > 0 ? '100%' : '100%';
            document.getElementById('duration').textContent = stats.runs > 0 ? (stats.duration / stats.runs).toFixed(1) + 's' : '0s';
            const now = new Date();
            document.getElementById('lastrun').textContent = now.toLocaleTimeString();
        }

        async function triggerPipeline() {
            const btn = document.getElementById('triggerBtn');
            btn.disabled = true;
            
            addLog('▶ Pipeline triggered');
            addLog('Loading dependencies...');

            let totalDuration = 0;
            for (let i = 0; i < stages.length; i++) {
                const stageBox = document.getElementById('s' + i);
                addLog('Starting ' + stages[i].name + ' stage...');

                await new Promise(resolve => setTimeout(resolve, stages[i].duration * 1000));

                stageBox.classList.add('done');
                addLog('✓ ' + stages[i].name + ' stage completed (' + stages[i].duration + 's)');
                totalDuration += stages[i].duration;
            }

            addLog('✓ All stages completed successfully!');
            addLog('Total execution time: ' + totalDuration.toFixed(1) + 's');

            stats.runs++;
            stats.duration += totalDuration;
            localStorage.setItem('pipelineStats', JSON.stringify(stats));
            updateStats();

            btn.disabled = false;
        }

        // Initialize
        window.addEventListener('load', () => {
            updateStats();
            addLog('Dashboard ready');
        });
    </script>
</body>
</html>
